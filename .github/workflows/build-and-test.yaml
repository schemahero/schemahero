name: "Build and test"
on:
  pull_request:
    branches: [ main ]
  push:
    tags-ignore: ["*"] # tags run tagged-release workflow
    branches: [ main ] # run tests on main branch

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      postgres: ${{ steps.filter.outputs.postgres }}
      mysql: ${{ steps.filter.outputs.mysql }}
      cockroach: ${{ steps.filter.outputs.cockroach }}
      cassandra: ${{ steps.filter.outputs.cassandra }}
      sqlite: ${{ steps.filter.outputs.sqlite }}
      rqlite: ${{ steps.filter.outputs.rqlite }}
      timescaledb: ${{ steps.filter.outputs.timescaledb }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core:
              - 'pkg/**'
              - 'cmd/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/build-and-test.yaml'
            postgres:
              - 'plugins/postgres/**'
              - 'integration/tests/postgres/**'
            mysql:
              - 'plugins/mysql/**'
              - 'integration/tests/mysql/**'
            cockroach:
              - 'plugins/postgres/**'
              - 'integration/tests/cockroach/**'
            cassandra:
              - 'plugins/cassandra/**'
              - 'integration/tests/cassandra/**'
            sqlite:
              - 'plugins/sqlite/**'
              - 'integration/tests/sqlite/**'
            rqlite:
              - 'plugins/rqlite/**'
              - 'integration/tests/rqlite/**'
            timescaledb:
              - 'plugins/timescaledb/**'
              - 'integration/tests/timescaledb/**'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum

      - run: make manifests bin/kubectl-schemahero manager
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: kubectl-schemahero
          path: bin/kubectl-schemahero
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: manager
          path: bin/manager

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum

      - name: Format and check for diffs
        run: |
          make fmt
          git diff --exit-code || {
            echo "::error::Please run 'make fmt' and commit changes"
            exit 1
          }
      - name: Check go mod tidy
        run: |
          make tidy
          git diff --exit-code -- go.mod go.sum "**/go.mod" "**/go.sum" || {
            echo "::error::Please run 'make tidy' and commit changes"
            exit 1
          }
      - run: make vet test

  # ── PostgreSQL ──────────────────────────────────────────────
  # PRs: latest version only. Main: full matrix.
  test-postgres:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.postgres == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ${{ github.ref == 'refs/heads/main' && fromJson('["14.20","15.15","16.11","17.7","18.1"]') || fromJson('["18.1"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build postgres plugin
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/postgres
          go build -o $HOME/.schemahero/plugins/schemahero-postgres .
          chmod +x $HOME/.schemahero/plugins/schemahero-postgres
      - run: make -C integration/tests/postgres ${{matrix.postgres_version}}

  # ── MySQL ───────────────────────────────────────────────────
  test-mysql:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.mysql == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        mysql_version: ${{ github.ref == 'refs/heads/main' && fromJson('["8.0.45","8.4.8","9.5.2"]') || fromJson('["9.5.2"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build mysql plugin
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/mysql
          go build -o $HOME/.schemahero/plugins/schemahero-mysql .
          chmod +x $HOME/.schemahero/plugins/schemahero-mysql
      - run: make -C integration/tests/mysql ${{matrix.mysql_version}}

  # ── CockroachDB ─────────────────────────────────────────────
  test-cockroach:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.cockroach == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        cockroachdb_version: ${{ github.ref == 'refs/heads/main' && fromJson('["v24.3.25","v25.2.11","v25.4.3"]') || fromJson('["v25.4.3"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build postgres plugin (cockroach uses postgres plugin)
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/postgres
          go build -o $HOME/.schemahero/plugins/schemahero-postgres .
          chmod +x $HOME/.schemahero/plugins/schemahero-postgres
      - run: make -C integration/tests/cockroach ${{matrix.cockroachdb_version}}

  # ── Cassandra ───────────────────────────────────────────────
  test-cassandra:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.cassandra == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        cassandra_version: ${{ github.ref == 'refs/heads/main' && fromJson('["4.0.19","4.1.10","5.0.6"]') || fromJson('["5.0.6"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build cassandra plugin
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/cassandra
          go build -o $HOME/.schemahero/plugins/schemahero-cassandra .
          chmod +x $HOME/.schemahero/plugins/schemahero-cassandra
      - run: make -C integration/tests/cassandra ${{matrix.cassandra_version}}

  # ── SQLite ──────────────────────────────────────────────────
  test-sqlite:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.sqlite == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        sqlite_version: ["3.51.2"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build sqlite plugin
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/sqlite
          go build -o $HOME/.schemahero/plugins/schemahero-sqlite .
          chmod +x $HOME/.schemahero/plugins/schemahero-sqlite
      - run: make -C integration/tests/sqlite ${{matrix.sqlite_version}}

  # ── RQLite ──────────────────────────────────────────────────
  test-rqlite:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.rqlite == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        rqlite_version: ${{ github.ref == 'refs/heads/main' && fromJson('["8.36.8","9.3.18"]') || fromJson('["9.3.18"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build rqlite plugin
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/rqlite
          go build -o $HOME/.schemahero/plugins/schemahero-rqlite .
          chmod +x $HOME/.schemahero/plugins/schemahero-rqlite
      - run: make -C integration/tests/rqlite ${{matrix.rqlite_version}}

  # ── TimescaleDB ─────────────────────────────────────────────
  test-timescaledb:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: >-
      needs.changes.outputs.core == 'true'
      || needs.changes.outputs.timescaledb == 'true'
      || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        timescaledb_version: ["2.25.0-pg17"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: ./go.sum
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - name: Build timescaledb plugin
        run: |
          mkdir -p $HOME/.schemahero/plugins
          cd plugins/timescaledb
          go build -o $HOME/.schemahero/plugins/schemahero-timescaledb .
          chmod +x $HOME/.schemahero/plugins/schemahero-timescaledb
      - run: make -C integration/tests/timescaledb ${{matrix.timescaledb_version}}

  # ── Fixtures ────────────────────────────────────────────────
  test-fixtures:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Download kubectl-schemahero binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: kubectl-schemahero
          path: bin/
      - run: chmod +x bin/kubectl-schemahero
      - run: make -C integration/tests/fixtures run

  # ── Gate ────────────────────────────────────────────────────
  all-tests-passed:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - test
      - test-postgres
      - test-mysql
      - test-cockroach
      - test-cassandra
      - test-sqlite
      - test-rqlite
      - test-timescaledb
      - test-fixtures
    steps:
      - name: Check results
        run: |
          # Fail if any needed job failed (skipped is OK from path filtering)
          FAILED=false
          for result in \
            "${{ needs.build.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.test-postgres.result }}" \
            "${{ needs.test-mysql.result }}" \
            "${{ needs.test-cockroach.result }}" \
            "${{ needs.test-cassandra.result }}" \
            "${{ needs.test-sqlite.result }}" \
            "${{ needs.test-rqlite.result }}" \
            "${{ needs.test-timescaledb.result }}" \
            "${{ needs.test-fixtures.result }}" \
          ; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more jobs failed"
            exit 1
          fi

          echo "All tests passed (some may have been skipped due to path filtering)"
